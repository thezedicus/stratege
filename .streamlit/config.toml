[server]
headless = true
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 5
fileWatcherType = "none"

[browser]
gatherUsageStats = false
serverAddress = "0.0.0.0"

[client]
showSidebarNavigation = false
showErrorDetails = false
toolbarMode = "minimal"

[theme]
base = "light"
primaryColor = "#3DBDB6"
backgroundColor = "#FAFCFB"
secondaryBackgroundColor = "#F0F8F5"
textColor = "#0B2221"
font = "sans serif"

[runner]
fastReruns = true
magicEnabled = false
enumCoercingBehavior = "off"
