[server]
headless = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 5
port = 8502

[browser]
gatherUsageStats = false
serverAddress = "localhost"

[theme]
base = "light"
primaryColor = "#D97706"
backgroundColor = "#FAF8F4"
secondaryBackgroundColor = "#F2EFE8"
textColor = "#1A1A1A"
font = "sans serif"

[runner]
fastReruns = true
magicEnabled = false
